services:
  postgres:
    image: postgres:16-alpine
    container_name: competehub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-competehub}
      POSTGRES_USER: ${POSTGRES_USER:-competehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-competehub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-competehub} -d ${POSTGRES_DB:-competehub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: competehub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: competehub-backend
    env_file:
      - .env.example
    environment:
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://competehub:competehub@postgres:5432/competehub}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: competehub-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  backend_uploads:
