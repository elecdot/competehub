name: Docs

on:
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "apps/api/pyproject.toml"
      - "apps/api/uv.lock"
      - "docs/**"
      - "mkdocs.yml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "apps/api/pyproject.toml"
      - "apps/api/uv.lock"
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: docs-uv-${{ runner.os }}-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: |
            docs-uv-${{ runner.os }}-

      - name: Sync documentation dependencies
        run: ./scripts/agent-env.sh uv sync --project apps/api --group docs --locked

      - name: Build documentation
        run: ./scripts/agent-env.sh uv run --project apps/api --group docs mkdocs build --strict

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Deployment is separate from the build job so pull requests can validate docs without publishing.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
