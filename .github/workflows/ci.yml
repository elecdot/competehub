name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Keep CI jobs aligned with repository areas so failures point to the owning surface.
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Sync backend dependencies
        run: ./scripts/agent-env.sh uv sync --project apps/api --locked

      - name: Run backend lint
        run: ./scripts/agent-env.sh ruff check .

      - name: Run backend tests
        run: ./scripts/agent-env.sh pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix apps/web ci

      - name: Run frontend typecheck
        run: npm --prefix apps/web run lint

      - name: Build frontend
        run: npm --prefix apps/web run build

  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose -f infra/docker-compose.yml config
