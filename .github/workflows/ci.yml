name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Keep CI jobs aligned with repository areas so failures point to the owning surface.
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: competehub
          POSTGRES_PASSWORD: competehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U competehub -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Sync backend dependencies
        run: ./scripts/agent-env.sh uv sync --project apps/api --locked

      - name: Run backend lint
        run: ./scripts/agent-env.sh uv run --project apps/api ruff check .

      - name: Run backend tests
        env:
          POSTGRES_TEST_ADMIN_URL: postgresql://competehub:competehub@localhost:5432/postgres
        run: ./scripts/agent-env.sh uv run --project apps/api pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix apps/web ci

      - name: Run frontend typecheck
        run: npm --prefix apps/web run lint

      - name: Build frontend
        run: npm --prefix apps/web run build

  browser:
    name: Browser E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: .cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Sync backend dependencies
        run: ./scripts/agent-env.sh uv sync --project apps/api --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix apps/web ci

      - name: Install Playwright Chromium
        run: npm --prefix apps/web run e2e:install -- --with-deps

      - name: Run browser E2E
        run: npm --prefix apps/web run test:e2e

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-${{ github.run_id }}
          path: |
            .cache/playwright/report
            .cache/playwright/test-results
          if-no-files-found: ignore
          retention-days: 7

  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: |
          bash -n scripts/course-demo.sh scripts/test-course-demo.sh
          docker compose -f infra/docker-compose.yml config
          ./scripts/course-demo.sh config-example
          ./scripts/test-course-demo.sh
