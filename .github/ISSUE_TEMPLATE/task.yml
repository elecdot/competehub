name: Task
description: Track documentation, CI, refactor, maintenance, or coordination work.
title: "chore: "
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - api
        - web
        - db
        - auth
        - ui
        - docs
        - infra
        - ci
        - tests
        - deps
        - config
        - agents
        - git
        - project
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Change Type
      options:
        - docs
        - style
        - refactor
        - perf
        - test
        - build
        - ci
        - chore
        - meta
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap Phase
      description: Pick the phase this task supports, or "not applicable" for pure process/tooling work.
      options:
        - P0 minimum runnable loop
        - P1 core business workflow
        - P2 recommendation and governance
        - P3 quality and operations hardening
        - P4 later extensions
        - not applicable
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be changed, cleaned up, or clarified?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and explicitly out of scope?
      placeholder: |
        Included:
        - ...

        Out of scope:
        - ...
    validations:
      required: true
  - type: checkboxes
    id: affected_surfaces
    attributes:
      label: Affected Surfaces
      description: Select every surface that this task is expected to touch.
      options:
        - label: backend API or services
        - label: frontend UI or state
        - label: data model, migrations, or seed data
        - label: product, API, data, architecture, or technical docs
        - label: course reports
        - label: CI, setup, tooling, or infrastructure
        - label: GitHub issue, PR, or project workflow
  - type: textarea
    id: ownership
    attributes:
      label: Delivery Ownership
      description: Required before ready-for-agent. Use one DRI; type contributors as Active, Align with, or FYI; keep validation owned by a human member or role.
      placeholder: |
        DRI: a|b|c|d|e|f or role
        Contributors:
        - Active - member: responsibility
        - Align with - member: boundary to confirm
        - FYI - member: reason
        Reviewer: f or relevant reviewer
        Validation owner: human member or role
        Docs impact: docs/path.md or None - explicitly reviewed
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Completion Checklist
      description: Concrete steps or acceptance checks.
      placeholder: |
        - First required change
        - Validation command or review check
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation Plan
      description: Which checks or manual review steps should prove this task is complete?
      placeholder: |
        - just docs-build
        - Manual review: ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant files, tradeoffs, constraints, or follow-up work.
    validations:
      required: false
