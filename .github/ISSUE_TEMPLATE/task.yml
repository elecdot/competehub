name: Task
description: Track documentation, CI, refactor, maintenance, or coordination work.
title: "chore: "
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - api
        - web
        - db
        - auth
        - ui
        - docs
        - infra
        - ci
        - tests
        - deps
        - config
        - agents
        - git
        - project
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Change Type
      options:
        - docs
        - style
        - refactor
        - perf
        - test
        - build
        - ci
        - chore
        - meta
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap Phase
      description: Pick the phase this task supports, or "not applicable" for pure process/tooling work.
      options:
        - P0 minimum runnable loop
        - P1 core business workflow
        - P2 recommendation and governance
        - P3 quality and operations hardening
        - P4 later extensions
        - not applicable
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be changed, cleaned up, or clarified?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and explicitly out of scope?
      placeholder: |
        Included:
        - ...

        Out of scope:
        - ...
    validations:
      required: true
  - type: textarea
    id: source_contracts
    attributes:
      label: Source Contracts
      description: Name the exact PRD, specification, workflow, expected behavior, or other source documents. State why a Feature PRD is not applicable when relevant.
      placeholder: |
        Feature PRD: docs/prds/features/example.md or not applicable - reason
        Other sources:
        - docs/project_workflow.md
        Coverage: exact stories, criteria, or rules supported
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: State observable outcomes independently from the implementation checklist below.
      placeholder: |
        - Given ..., when ..., then ...
        - The validation owner can observe ...
    validations:
      required: true
  - type: checkboxes
    id: affected_surfaces
    attributes:
      label: Affected Surfaces
      description: Select every surface that this task is expected to touch.
      options:
        - label: backend API or services
        - label: frontend UI or state
        - label: data model, migrations, or seed data
        - label: product, API, data, architecture, or technical docs
        - label: course reports
        - label: CI, setup, tooling, or infrastructure
        - label: GitHub issue, PR, or project workflow
  - type: textarea
    id: ownership
    attributes:
      label: Delivery Ownership
      description: Required before ready-for-agent. Use one DRI; type contributors as Active, Align with, or FYI; keep validation owned by a human member or role.
      placeholder: |
        DRI: a|b|c|d|e|f or role
        Contributors:
        - Active - member: responsibility
        - Align with - member: boundary to confirm
        - FYI - member: reason
        Reviewer: f or relevant reviewer
        Validation owner: human member or role
        Docs impact: docs/path.md or None - explicitly reviewed
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Completion Checklist
      description: Concrete steps or acceptance checks.
      placeholder: |
        - First required change
        - Validation command or review check
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation Plan
      description: Which checks or manual review steps should prove this task is complete?
      placeholder: |
        - just docs-build
        - Manual review: ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant files, tradeoffs, constraints, or follow-up work.
    validations:
      required: false
  - type: textarea
    id: agent_quality_gate
    attributes:
      label: Agent Quality Gate
      description: Keep this checklist in the issue. Complete it when agent-assisted implementation starts and before its PR is opened.
      value: |
        - [ ] Before implementation, run `/grill-with-docs` against this issue and its linked source documents; add an alignment comment with confirmed decisions, open questions, and affected surfaces.
        - [ ] Do not invent unresolved product behavior; use `needs-info` for missing owner input or `blocked` for a known unmet dependency.
        - [ ] Before opening the PR, self-review the complete diff against acceptance criteria, source documents, and repository standards.
        - [ ] Fix blocking self-review findings, run required validation, and record acceptance evidence, skipped checks, fixed findings, and residual risk in the PR body.
        - [ ] Treat author self-review as a prerequisite, not a replacement for independent review and human validation.
    validations:
      required: true
