name: Feature Request
description: Propose a new capability or behavior change.
title: "feat: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - api
        - web
        - db
        - auth
        - ui
        - docs
        - infra
        - ci
        - agents
        - project
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap Phase
      description: Pick the phase this request most likely belongs to.
      options:
        - P0 minimum runnable loop
        - P1 core business workflow
        - P2 recommendation and governance
        - P3 quality and operations hardening
        - P4 later extensions
        - unsure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or project problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Outcome
      description: What should exist after this is done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete checks that would make this complete.
      placeholder: |
        - First observable outcome
        - Validation command or review check
    validations:
      required: true
  - type: textarea
    id: feature_prd
    attributes:
      label: Source Feature PRD
      description: Link the exact Feature PRD under docs/prds/features/ and identify the stories or acceptance criteria covered by this issue.
      placeholder: |
        Feature PRD: docs/prds/features/example.md
        Coverage: user stories 1-3; acceptance criteria 1-4
    validations:
      required: true
  - type: checkboxes
    id: affected_surfaces
    attributes:
      label: Affected Surfaces
      description: Select every surface this request is expected to touch.
      options:
        - label: backend API or services
        - label: frontend UI or state
        - label: data model, migrations, or seed data
        - label: product, API, data, architecture, or technical docs
        - label: course reports
        - label: CI, setup, tooling, or infrastructure
  - type: textarea
    id: ownership
    attributes:
      label: Delivery Ownership
      description: Optional during early feature request, but required before ready-for-agent. Use the project workflow ownership rules.
      placeholder: |
        DRI: a|b|c|d|e|f or role
        Contributors:
        - Active - member: responsibility
        - Align with - member: boundary to confirm
        - FYI - member: reason
        Reviewer: f or relevant reviewer
        Validation owner: human member or role
        Docs impact: docs/path.md or None - explicitly reviewed
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional tradeoffs, rejected approaches, or constraints.
    validations:
      required: false
  - type: textarea
    id: docs
    attributes:
      label: Documentation Impact
      description: Docs, ADRs, setup notes, or MkDocs navigation that may need updates.
    validations:
      required: false
  - type: textarea
    id: agent_quality_gate
    attributes:
      label: Agent Quality Gate
      description: Keep this checklist in the issue. Complete it when agent-assisted implementation starts and before its PR is opened.
      value: |
        - [ ] Before implementation, run `/grill-with-docs` against this issue and its linked source documents; add an alignment comment with confirmed decisions, open questions, and affected surfaces.
        - [ ] Do not invent unresolved product behavior; use `needs-info` for missing owner input or `blocked` for a known unmet dependency.
        - [ ] Before opening the PR, self-review the complete diff against acceptance criteria, source documents, and repository standards.
        - [ ] Fix blocking self-review findings, run required validation, and record acceptance evidence, skipped checks, fixed findings, and residual risk in the PR body.
        - [ ] Treat author self-review as a prerequisite, not a replacement for independent review and human validation.
    validations:
      required: true
