name: Bug Report
description: Report incorrect or unexpected behavior.
title: "fix: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - api
        - web
        - db
        - auth
        - docs
        - infra
        - ci
        - agents
        - project
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: What is happening now?
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Provide the shortest reliable reproduction path.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, failing commands, or affected routes.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Constraints, suspected cause, or related issues.
    validations:
      required: false
