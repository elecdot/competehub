          - Group Time Nodes into Stages and Prominence: adr/0017-group-time-nodes-into-stages-and-prominence.md
          - Disallow Self-Review of Competition Revisions: adr/0018-disallow-self-review-of-competition-revisions.md
          - Publish Immutable Competition Revisions: adr/0019-publish-immutable-competition-revisions.md
          - Derive Registration Status from Current Stages: adr/0020-derive-registration-status-from-current-stages.md
