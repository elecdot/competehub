site_name: CompeteHub
site_description: Student-centered competition discovery and recommendation system.
site_url: https://elecdot.github.io/competehub/
repo_name: elecdot/competehub
repo_url: https://github.com/elecdot/competehub

docs_dir: docs

# Add meetings into MkDocs nav only if its governance is defined.
exclude_docs: |
  meetings/

theme:
  name: material
  language: en
  font: false
  icon:
    logo: material/trophy
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  # These extensions keep long-form product and architecture docs readable.
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Start Here:
      - Home: README.md
      - Setup: setup.md
      - Roadmap: roadmap.md
  - Product:
      - Product Requirements: PRD.zh.md
      - Feature PRDs:
          - Overview: prds/features/README.md
          - Template: prds/features/template.md
          - Competition Publication And Discovery: prds/features/competition-publication-discovery.md
          - Student Following And Reminders: prds/features/student-following-reminders.md
          - Rule Recommendation And Governance Thin Slice: prds/features/rule-recommendation-governance-thin.md
  - Architecture:
      - Architecture: architecture.md
      - API Spec: api_spec.md
      - Data Model: data_model.md
      - Tech Spec: tech_spec.zh.md
      - ADR:
          - Overview: adr/README.md
          - Initial Application Architecture: adr/0001-initial-application-architecture.md
          - Initial Framework Supporting Choices: adr/0002-initial-framework-supporting-choices.md
          - Explainable Rule-Based Recommendation: adr/0003-explainable-rule-based-recommendation.md
          - In-App Reminders First: adr/0004-in-app-reminders-first.md
          - Trusted Source Manual Entry: adr/0005-trusted-source-manual-entry.md
          - Student and Admin Current Roles: adr/0006-student-admin-current-roles.md
          - Separate Favorites and Subscriptions: adr/0007-separate-favorites-and-subscriptions.md
