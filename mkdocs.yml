site_name: CompeteHub
site_description: Student-centered competition discovery and recommendation system.
site_url: https://elecdot.github.io/competehub/
repo_name: elecdot/competehub
repo_url: https://github.com/elecdot/competehub

docs_dir: docs

# Add meetings into MkDocs nav only if its governance is defined.
exclude_docs: |
  meetings/

theme:
  name: material
  language: en
  font: false
  icon:
    logo: material/trophy
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  # These extensions keep long-form product and architecture docs readable.
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Start Here:
      - Home: README.md
      - Setup: setup.md
      - Roadmap: roadmap.md
  - Product:
      - Product Requirements: PRD.zh.md
      - Feature PRDs:
          - Overview: prds/features/README.md
          - Template: prds/features/template.md
          - Competition Publication And Discovery: prds/features/competition-publication-discovery.md
          - Student Following And Reminders: prds/features/student-following-reminders.md
          - Rule Recommendation And Governance Thin Slice: prds/features/rule-recommendation-governance-thin.md
  - Architecture:
      - Architecture: architecture.md
      - API Spec: api_spec.md
      - Data Model: data_model.md
      - Tech Spec: tech_spec.zh.md
      - ADR:
          - Overview: adr/README.md
          - Initial Application Architecture: adr/0001-initial-application-architecture.md
          - Initial Framework Supporting Choices: adr/0002-initial-framework-supporting-choices.md
          - Explainable Rule-Based Recommendation: adr/0003-explainable-rule-based-recommendation.md
          - In-App Reminders First: adr/0004-in-app-reminders-first.md
          - Trusted Source Manual Entry: adr/0005-trusted-source-manual-entry.md
          - Student and Admin Current Roles: adr/0006-student-admin-current-roles.md
          - Separate Favorites and Subscriptions: adr/0007-separate-favorites-and-subscriptions.md
          - Ant Design Vue UI Library: adr/0008-ant-design-vue-ui-library.md
          - Flask Cookie Session Auth: adr/0009-flask-cookie-session-auth.md
          - Staged Frontend Quality Gates: adr/0010-staged-frontend-quality-gates.md
          - PostgreSQL Search First: adr/0011-postgresql-search-first.md
  - Delivery:
      - Project Workflow: project_workflow.md
      - Testing Model: testing.md
      - Tooling: tooling.md
      - Conventions: CONVENTIONS.md
  - Agents:
      - Overview: agents/README.md
      - Feature PRDs: agents/feature-prd.md
      - Issue Tracker: agents/issue-tracker.md
      - Triage Labels: agents/triage-labels.md
      - Domain Docs: agents/domain.md
      - Test-Driven Development: agents/tdd.md
  - Reports:
      - Overview: reports/README.md
      - Formal Reports:
          - Project Development Plan: reports/01_项目开发计划.md
          - Requirements Specification: reports/02_需求规格说明.md
          - Software Design Specification: reports/03_软件设计说明.md
      - Requirements Gathering: reports/requirements.md
      - Module Breakdown v1.0: reports/module_breakdown_v1.0.md
      - Templates:
          - Project Development Plan: reports/templates/01_项目开发计划.template.md
          - Requirements Specification: reports/templates/02_需求规格说明.template.md
          - Software Design Specification: reports/templates/03_软件设计说明.template.md
          - Project Development Record: reports/templates/04_项目开发记录.template.md
          - Test Plan: reports/templates/05_测试计划.template.md
          - User Manual: reports/templates/06_用户操作手册.template.md

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
