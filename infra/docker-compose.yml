name: competehub

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: competehub
      POSTGRES_USER: competehub
      POSTGRES_PASSWORD: competehub
    ports:
      - "5432:5432"
    volumes:
      - competehub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competehub -d competehub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - competehub_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  competehub_postgres_data:
  competehub_redis_data:
