[tools]
python = "3.11"
node = "22"
uv = "latest"
just = "latest"

[tasks.setup]
description = "Install backend and frontend dependencies"
run = [
  "just api-sync",
  "npm --prefix apps/web install",
]

[tasks.check]
description = "Run main local checks"
run = [
  "just api-test",
  "just api-lint",
  "just web-lint",
  "just web-build",
  "just docs-build",
  "docker compose -f infra/docker-compose.yml config",
]
